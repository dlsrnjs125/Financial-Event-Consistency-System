name: CI - Financial Consistency Deployment Gate

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

env:
  PYTHON_VERSION: "3.11"

jobs:
  lint:
    runs-on: ubuntu-latest
    name: Format / Lint
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip
          cache-dependency-path: backend/requirements.txt

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r backend/requirements.txt

      - name: Run format and lint checks
        run: |
          make format-check PYTHON=python BLACK=black ISORT=isort RUFF=ruff
          make lint PYTHON=python FLAKE8=flake8 RUFF=ruff
          make scripts-check

  unit-tests:
    runs-on: ubuntu-latest
    name: Unit Tests
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip
          cache-dependency-path: backend/requirements.txt

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r backend/requirements.txt

      - name: Run unit tests
        run: pytest backend/tests/unit -v --cov=backend/app --cov-report=xml

      - name: Upload coverage reports
        uses: codecov/codecov-action@v4
        continue-on-error: true
        with:
          files: ./coverage.xml

  consistency-tests:
    runs-on: ubuntu-latest
    name: Consistency Tests
    services:
      postgres:
        image: postgres:15-alpine
        env:
          POSTGRES_DB: financial_events
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: password
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432

      redis:
        image: redis:7-alpine
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 6379:6379

    env:
      APP_ENV: test
      DATABASE_URL: postgresql://postgres:password@localhost:5432/financial_events
      REDIS_URL: redis://localhost:6379/0
      HMAC_ENABLED: "true"
      EXTERNAL_CLIENT_SECRETS: bank-a:change-me-secret,broker-b:change-me-secret

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip
          cache-dependency-path: backend/requirements.txt

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r backend/requirements.txt

      - name: Run consistency tests
        run: |
          pytest \
            backend/tests/consistency \
            backend/tests/integration/test_transaction_event_processing.py \
            backend/tests/integration/test_transaction_event_api.py \
            backend/tests/unit/test_transaction_state_machine.py \
            backend/tests/unit/test_structured_logging.py \
            backend/tests/unit/test_masking.py \
            -v --tb=short

  migration-tests:
    runs-on: ubuntu-latest
    name: Migration Tests
    services:
      postgres:
        image: postgres:15-alpine
        env:
          POSTGRES_DB: financial_events
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: password
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432

    env:
      APP_ENV: test
      DATABASE_URL: postgresql://postgres:password@localhost:5432/financial_events

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip
          cache-dependency-path: backend/requirements.txt

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r backend/requirements.txt

      - name: Run migrations
        run: |
          alembic upgrade head
          alembic current

      - name: Verify model imports and consistency constraints
        run: PYTHONPATH=backend python scripts/check_migration_constraints.py

  security-log-check:
    runs-on: ubuntu-latest
    name: Security Log Check
    steps:
      - uses: actions/checkout@v4

      - name: Install ripgrep
        run: sudo apt-get update && sudo apt-get install -y ripgrep

      - name: Scan structured logs for raw sensitive fields
        run: make security-log-check

  secret-scan:
    runs-on: ubuntu-latest
    name: Secret Scan
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: TruffleHog Secret Scan for Pull Request
        if: github.event_name == 'pull_request'
        # trufflesecurity/trufflehog v3.95.3
        uses: trufflesecurity/trufflehog@37b77001d0174ebec2fcca2bd83ff83a6d45a3ab
        with:
          path: ./
          base: ${{ github.event.pull_request.base.sha }}
          head: ${{ github.event.pull_request.head.sha }}
          extra_args: --only-verified

      - name: TruffleHog Secret Scan for Push
        if: github.event_name == 'push' && github.event.before != '0000000000000000000000000000000000000000'
        # trufflesecurity/trufflehog v3.95.3
        uses: trufflesecurity/trufflehog@37b77001d0174ebec2fcca2bd83ff83a6d45a3ab
        with:
          path: ./
          base: ${{ github.event.before }}
          head: ${{ github.sha }}
          extra_args: --only-verified

      - name: TruffleHog Secret Scan for Initial Push
        if: github.event_name == 'push' && github.event.before == '0000000000000000000000000000000000000000'
        # trufflesecurity/trufflehog v3.95.3
        uses: trufflesecurity/trufflehog@37b77001d0174ebec2fcca2bd83ff83a6d45a3ab
        with:
          path: ./
          extra_args: --only-verified

  docker-build:
    runs-on: ubuntu-latest
    name: Docker Build
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Docker image
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          file: ./backend/Dockerfile
          push: false
          load: true
          tags: financial-events:test

      - name: Inspect Docker image
        run: docker image inspect financial-events:test >/dev/null

  ops4-dr-drill:
    runs-on: ubuntu-latest
    name: Ops4 PostgreSQL DR Drill
    steps:
      - uses: actions/checkout@v4

      - name: Start DR database stack
        run: docker compose up -d postgres postgres-restore

      - name: Run Ops4 DR drill
        run: make ops4-drill

      - name: Verify DR report
        run: |
          test -f reports/dr/ops4-postgres-restore-drill.md
          grep -q "DR Drill" reports/dr/ops4-postgres-restore-drill.md
          grep -q "PASS" reports/dr/ops4-postgres-restore-drill.md
          grep -q "sequence_position_lag_count=0" reports/dr/ops4-postgres-restore-drill.md

  gate-check:
    runs-on: ubuntu-latest
    name: Deployment Gate Summary
    needs:
      - lint
      - unit-tests
      - consistency-tests
      - migration-tests
      - security-log-check
      - secret-scan
      - docker-build
      - ops4-dr-drill
    if: always()
    steps:
      - name: Summarize required deployment gates
        run: |
          failed=0

          check_gate() {
            name="$1"
            result="$2"
            if [ "$result" != "success" ]; then
              echo "Gate failed: ${name} (${result})"
              failed=1
            else
              echo "Gate passed: ${name}"
            fi
          }

          check_gate "lint" "${{ needs.lint.result }}"
          check_gate "unit-tests" "${{ needs.unit-tests.result }}"
          check_gate "consistency-tests" "${{ needs.consistency-tests.result }}"
          check_gate "migration-tests" "${{ needs.migration-tests.result }}"
          check_gate "security-log-check" "${{ needs.security-log-check.result }}"
          check_gate "secret-scan" "${{ needs.secret-scan.result }}"
          check_gate "docker-build" "${{ needs.docker-build.result }}"
          check_gate "ops4-dr-drill" "${{ needs.ops4-dr-drill.result }}"

          if [ "$failed" -ne 0 ]; then
            echo "One or more deployment gates failed"
            exit 1
          fi

          echo "All deployment gates passed"
