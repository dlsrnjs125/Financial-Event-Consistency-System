global:
  scrape_interval: 15s
  evaluation_interval: 15s
  external_labels:
    monitor: 'financial-events-monitor'

alerting:
  alertmanagers:
    - static_configs:
        - targets:
            - alertmanager:9093

rule_files:
  - '/etc/prometheus/financial-event-alert-rules.yml'

scrape_configs:
  # Prometheus self-monitoring
  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']

  # API Server metrics
  - job_name: 'api-server'
    metrics_path: '/metrics'
    static_configs:
      - targets: ['nginx:8081']
    scrape_interval: 5s
