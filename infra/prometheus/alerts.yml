groups:
  - name: financial_events
    interval: 30s
    rules:
      # Duplicate event detection
      - alert: DuplicateEventsDetected
        expr: rate(transaction_events_duplicated_total[5m]) > 0
        for: 1m
        labels:
          severity: critical
        annotations:
          summary: "Duplicate transaction events detected"
          description: "{{ $value }} duplicate events detected in the last 5 minutes"

      # Invalid state transition detection
      - alert: InvalidStateTransitionAttempted
        expr: rate(invalid_state_transition_total[5m]) > 0
        for: 1m
        labels:
          severity: critical
        annotations:
          summary: "Invalid state transition attempted"
          description: "{{ $value }} invalid state transitions attempted in the last 5 minutes"

      # High error rate
      - alert: HighErrorRate
        expr: rate(http_requests_total{status=~"5.."}[5m]) > 0.05
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "High error rate detected"
          description: "Error rate is {{ $value | humanizePercentage }} over the last 5 minutes"

      # API response time too high
      - alert: HighResponseTime
        expr: histogram_quantile(0.95, http_request_duration_seconds_bucket) > 1
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "High API response time"
          description: "p95 response time is {{ $value }}s"

      # Database connection pool exhaustion
      - alert: DBConnectionPoolExhaustion
        expr: db_connections_active / db_connections_max > 0.9
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "Database connection pool nearly exhausted"
          description: "Active connections: {{ $value | humanizePercentage }} of max"

      # Redis is down
      - alert: RedisDown
        expr: redis_up == 0
        for: 1m
        labels:
          severity: critical
        annotations:
          summary: "Redis is down"
          description: "Redis instance is unavailable"

      # Low cache hit ratio
      - alert: LowCacheHitRatio
        expr: (rate(redis_keyspace_hits_total[5m]) / (rate(redis_keyspace_hits_total[5m]) + rate(redis_keyspace_misses_total[5m]))) < 0.7
        for: 10m
        labels:
          severity: warning
        annotations:
          summary: "Low Redis cache hit ratio"
          description: "Cache hit ratio is {{ $value | humanizePercentage }}"
