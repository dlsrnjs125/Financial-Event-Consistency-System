groups:
  - name: financial-event-ops6-alerts
    interval: 30s
    rules:
      - alert: FinancialApiDown
        expr: up{job=~"api|api-server"} == 0
        for: 1m
        labels:
          severity: critical
          domain: financial-event
          component: api
          runbook: docs/24-alerting-incident-response-runbook.md
        annotations:
          summary: "Financial Event API metrics target is down"
          description: "Prometheus cannot scrape the API target through the internal metrics endpoint."
          impact: "Incoming financial events may be unavailable or unobservable; deployment rollback or API recovery may be required."
          action: "Check API and Nginx containers, then run health/readiness and deployment smoke checks."

      - alert: FinancialApiHighErrorRate
        expr: |
          sum(rate(financial_http_errors_total{status_class="5xx"}[5m]))
          /
          clamp_min(sum(rate(financial_http_requests_total[5m])), 1)
          > 0.01
        for: 5m
        labels:
          severity: critical
          domain: financial-event
          component: api
          runbook: docs/24-alerting-incident-response-runbook.md
        annotations:
          summary: "Financial Event API 5xx error rate is high"
          description: "The API 5xx ratio is above 1 percent for 5 minutes."
          impact: "External systems may retry requests; idempotency and duplicate-prevention paths must be watched closely."
          action: "Inspect API logs by trace/request id, check PostgreSQL readiness, and run deployment smoke plus consistency verification."

      - alert: FinancialApiHighLatencyP95
        expr: |
          histogram_quantile(
            0.95,
            sum(rate(financial_http_request_duration_seconds_bucket[5m])) by (le)
          ) > 0.5
        for: 5m
        labels:
          severity: warning
          domain: financial-event
          component: api
          runbook: docs/24-alerting-incident-response-runbook.md
        annotations:
          summary: "Financial Event API p95 latency is high"
          description: "HTTP p95 latency is above 500ms for 5 minutes."
          impact: "Users may see slower responses and external systems may retry more aggressively."
          action: "Check API, Redis fallback, PostgreSQL connection pressure, and recent deployment changes."

      - alert: FinancialRedisDown
        expr: |
          redis_up == 0
          or financial_readiness_dependency_status{dependency="redis"} == 0
        for: 1m
        labels:
          severity: warning
          domain: financial-event
          component: redis
          runbook: docs/24-alerting-incident-response-runbook.md
        annotations:
          summary: "Redis is down or readiness is degraded"
          description: "Redis is unavailable from exporter metrics or application readiness."
          impact: "Redis lock/cache acceleration is unavailable; final consistency should still be protected by PostgreSQL."
          action: "Confirm degraded readiness, watch Redis fallback and DB retry metrics, then run the Redis recovery drill if needed."

      - alert: FinancialPostgresDown
        expr: |
          up{job="postgres-exporter"} == 0
          or pg_up == 0
          or financial_readiness_dependency_status{dependency="postgres"} == 0
        for: 1m
        labels:
          severity: critical
          domain: financial-event
          component: postgres
          runbook: docs/24-alerting-incident-response-runbook.md
        annotations:
          summary: "PostgreSQL is down or application readiness failed"
          description: "PostgreSQL exporter, pg_up, or application readiness reports PostgreSQL failure."
          impact: "PostgreSQL is the Source of Truth; new financial event processing should be considered unavailable."
          action: "Stop destructive operations, check PostgreSQL container/connection state, restore readiness, then run consistency verification."

      - alert: FinancialInvalidStateTransitionDetected
        expr: sum(rate(financial_invalid_state_transition_total[5m])) > 0
        for: 1m
        labels:
          severity: critical
          domain: financial-event
          component: consistency
          runbook: docs/24-alerting-incident-response-runbook.md
        annotations:
          summary: "Invalid financial event state transition was rejected"
          description: "The application rejected at least one forbidden transaction state transition."
          impact: "This may indicate an upstream event-ordering problem or a regression in state transition handling."
          action: "Identify the event flow from logs, verify no ledger duplication occurred, and run consistency checks."

      - alert: FinancialReconciliationFailureDetected
        expr: financial_reconciliation_failures_total > 0
        for: 1m
        labels:
          severity: critical
          domain: financial-event
          component: consistency
          runbook: docs/24-alerting-incident-response-runbook.md
        annotations:
          summary: "Ledger/account reconciliation failure was detected"
          description: "A reconciliation failure metric is non-zero."
          impact: "This is a critical financial consistency signal and is more severe than ordinary availability degradation."
          action: "Pause risky traffic, preserve evidence, run consistency SQL, and start the consistency incident runbook."
